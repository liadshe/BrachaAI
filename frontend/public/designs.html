<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Comparison</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .design-box {
      border: 2px solid #4f46e5;
      border-radius: 12px;
      padding: 10px;
      background: rgba(79, 70, 229, 0.1);
    }
    .design-box h2 {
      color: white;
      margin-top: 0;
    }
    .design-box img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1 style="color: white; text-align: center;">Design Comparison</h1>
  <div class="container">
    <div class="design-box">
      <h2>Login Design</h2>
      <img src="/login.png" alt="Login Design">
    </div>
    <div class="design-box">
      <h2>Start Design</h2>
      <img src="/start.png" alt="Start Design">
    </div>
  </div>
</body>
</html>
